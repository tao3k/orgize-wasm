name: CI

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      orgize-ref:
        description: orgize branch, tag, or commit to use as the parent checkout
        required: false
        default: 6174dc0d203c9b3aa393814872ef4b2d268fae56

env:
  ORGIZE_REF: ${{ github.event.inputs['orgize-ref'] || '6174dc0d203c9b3aa393814872ef4b2d268fae56' }}
  CARGO_INCREMENTAL: "0"
  CARGO_TARGET_DIR: ${{ github.workspace }}/orgize/target/orgize-wasm

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout orgize-wasm
        uses: actions/checkout@v6

      - name: Verify committed dist package
        run: |
          test -f dist/orgize.js
          test -f dist/orgize.d.ts
          test -f dist/orgize_bg.wasm
          test -f dto.d.ts
          test -f worker.js

      - name: Smoke test git-consumable package
        run: |
          node --input-type=module <<'JS'
          import { readFileSync } from 'node:fs';
          import { initSync, Org } from './dist/orgize.js';

          const bytes = readFileSync('./dist/orgize_bg.wasm');
          initSync({ module: bytes });
          const org = new Org('* Git package smoke\n');
          if (!org.html().includes('Git package smoke')) {
            throw new Error('html projection did not render expected heading');
          }
          org.free();
          JS

      - name: Pack npm artifact
        run: |
          mkdir -p package
          npm pack --pack-destination package

      - name: Upload npm artifact
        uses: actions/upload-artifact@v5
        with:
          name: orgize-wasm-npm-package
          path: package/*.tgz
          if-no-files-found: error

  source-build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout orgize parent
        uses: actions/checkout@v6
        with:
          repository: tao3k/orgize
          ref: ${{ env.ORGIZE_REF }}
          path: orgize
          submodules: false

      - name: Remove parent wasm placeholder
        run: rm -rf orgize/wasm

      - name: Checkout orgize-wasm
        uses: actions/checkout@v6
        with:
          path: orgize/wasm

      - name: Normalize parent workspace
        working-directory: orgize
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          manifest = Path("Cargo.toml")
          text = manifest.read_text()
          text = re.sub(r'members\s*=\s*\[[^\]]*\]', 'members = ["."]', text, count=1)
          manifest.write_text(text)
          PY

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            orgize -> target
          shared-key: orgize-wasm-ci-${{ runner.os }}
          cache-on-failure: true

      - name: Validate Rust package
        working-directory: orgize
        run: |
          cargo fmt --manifest-path wasm/Cargo.toml --all -- --check
          cargo test --manifest-path wasm/Cargo.toml --all-targets --all-features
          cargo clippy --manifest-path wasm/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Build wasm package
        working-directory: orgize/wasm
        run: |
          wasm-pack build -t web -d dist --out-name orgize
          rm -f dist/.gitignore
          git diff --exit-code -- dist
