<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orgize</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.22.0/ace.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.0/beautify-html.js"></script>

    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        overflow: hidden;
        width: 100%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: flex;
      }

      #workspace {
        display: flex;
        flex: 1 1 auto;
        flex-direction: row;
        gap: 16px;
        margin: 16px;
        min-height: 0;
        min-width: 0;
        width: calc(100vw - 32px);
      }

      .bordered {
        min-width: 0;
        overflow: hidden;
        flex: 1 1 0;
        display: flex;
        flex-direction: column;
        border: 1px solid #dbdbdb;
        border-radius: 4px;
      }

      .output-pane {
        margin: 0;
        max-width: none;
        padding: 0;
      }

      .rendered-html {
        margin: 0;
        max-width: none;
        min-width: 0;
        padding: 1.25rem 1.5rem;
      }

      #took {
        color: #808080;
        font-size: 14px;
        padding: 0.5em 1em;
      }

      #tabsList {
        align-items: center;
        border-bottom-color: #dbdbdb;
        border-bottom-style: solid;
        border-bottom-width: 1px;
        display: flex;
        flex-grow: 0;
        flex-shrink: 0;
        justify-content: flex-start;
        list-style: none;
        margin: 0;
        padding: 0;
        overflow-x: auto;
      }

      #tabsList span {
        flex: 0 0 auto;
        white-space: nowrap;
        text-align: center;
        color: #4a4a4a;
        padding: 0.5em 1em;
        user-select: none;
        cursor: pointer;
      }

      #spacer {
        flex: 1 0 1rem;
      }

      #tabsList span.is-active {
        color: #485fc7;
      }

      .result-scroll {
        flex: 1;
        min-height: 0;
        min-width: 0;
        overflow: auto;
      }

      #result {
        min-width: 0;
      }

      #result pre {
        box-sizing: border-box;
        margin: 0;
        max-width: 100%;
        min-width: 0;
        overflow-wrap: anywhere;
        padding: 1rem;
        white-space: pre-wrap;
      }

      #result pre.render-error {
        color: #b42318;
      }

      #result a[data-range] {
        color: #485fc7;
        cursor: pointer;
      }

      .feature-overview {
        padding: 1.25rem 1.5rem;
      }

      .feature-overview h2 {
        margin-top: 0;
      }

      .feature-overview table {
        display: table;
        width: 100%;
      }

      .feature-overview td:first-child {
        white-space: nowrap;
        width: 12rem;
      }

      @media (max-width: 720px) {
        #workspace {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="workspace">
      <div class="bordered">
        <div style="height: 100%" id="editor"></div>
      </div>

      <div class="bordered output-pane">
        <div id="tabsList">
          <span class="is-active" data-value="html-rendered">
            HTML (rendered)
          </span>
          <span data-value="html">HTML</span>
          <span data-value="markdown">Markdown</span>
          <span data-value="latex">LaTeX</span>
          <span data-value="syntax">Syntax</span>
          <span data-value="semantic">Semantic AST</span>
          <span data-value="wasm-dto">WASM DTO</span>
          <span data-value="org-elements">Org Elements</span>
          <span data-value="agenda">Agenda</span>
          <span data-value="agent-planning">Agent Planning</span>
          <span data-value="agent-memory">Agent Memory</span>
          <span data-value="sdd">SDD</span>
          <span data-value="traverse">Traverse</span>
          <span data-value="features">Parser Features</span>
          <div id="spacer"></div>
          <div id="took"></div>
        </div>

        <div class="result-scroll">
          <div id="result"></div>
        </div>
      </div>
    </div>
  </body>

  <script type="module">
    import init, { Org } from "./dist/orgize.js";
    import renderMathInElement from "https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.mjs";

    let org;
    const result = document.getElementById("result");
    const took = document.getElementById("took");

    let type = "html-rendered";

    const editor = ace.edit("editor");
    editor.setTheme("ace/theme/tomorrow");

    // render by type

    const render = () => {
      const startTime = performance.now();

      try {
        org.update(editor.session.getValue());

        switch (type) {
          case "html-rendered": {
            const html = injectHeadingClass(org.html());
            result.innerHTML =
              "<div class='markdown-body rendered-html'>" + html + "</div>";
            renderMathInElement(result, {
              delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
                { left: "\\[", right: "\\]", display: true },
                {
                  left: "\\begin{align}",
                  right: "\\end{align}",
                  display: true,
                },
              ],
            });
            break;
          }

          case "html": {
            const html = html_beautify(org.html(), { indent_size: 2 });
            renderPre(html);
            break;
          }

          case "markdown": {
            renderPre(org.markdown());
            break;
          }

          case "latex": {
            renderPre(org.latex());
            break;
          }

          case "syntax": {
            renderPreHtml(renderRangeLinks(org.syntax()));
            break;
          }

          case "semantic": {
            renderPre(org.semantic());
            break;
          }

          case "wasm-dto": {
            renderPre(JSON.stringify(JSON.parse(org.snapshotJson()), null, 2));
            break;
          }

          case "org-elements": {
            renderPre(
              JSON.stringify(JSON.parse(org.orgElementsJson()), null, 2)
            );
            break;
          }

          case "agenda": {
            renderPre(org.agenda());
            break;
          }

          case "agent-planning": {
            renderPre(org.agentPlanning());
            break;
          }

          case "agent-memory": {
            renderPre(org.agentMemory());
            break;
          }

          case "sdd": {
            renderPre(org.sdd());
            break;
          }

          case "traverse": {
            renderPreHtml(renderRangeLinks(org.traverse()));
            break;
          }

          case "features": {
            result.innerHTML = renderFeatureOverview();
            break;
          }
        }

        const finishTime = performance.now();
        took.innerText = "took " + (finishTime - startTime).toFixed(2) + "ms";
      } catch (error) {
        renderPre(error && error.stack ? error.stack : String(error), {
          error: true,
        });
        took.innerText = "render failed";
      }
    };

    // select token or node range by click

    result.addEventListener("click", (ev) => {
      if (!ev.target.dataset.range) return;

      const [start, end] = ev.target.dataset.range.split("-");

      const startPos = editor.session.doc.indexToPosition(parseInt(start));
      const endPos = editor.session.doc.indexToPosition(parseInt(end));
      const range = new ace.Range(
        startPos.row,
        startPos.column,
        endPos.row,
        endPos.column
      );
      editor.gotoLine(startPos.row, startPos.column, true);
      editor.selection.setRange(range);
    });

    // switch render type

    document.getElementById("tabsList").addEventListener("click", (ev) => {
      const clicked = ev.target.closest("span");

      if (!clicked) return;

      if (!clicked.dataset.value) return;

      type = clicked.dataset.value;

      document.querySelectorAll("#tabsList span").forEach((el) => {
        if (el === clicked) {
          el.classList.add("is-active");
        } else {
          el.classList.remove("is-active");
        }
      });

      render();
    });

    // utils

    const escapeHtml = (html) =>
      html
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

    const injectHeadingClass = (html) =>
      html.replace(/<h(\d)>/g, (_, l) => `<h${l} class="title is-${l}">`);

    const renderPre = (text, options = {}) => {
      const className = options.error ? " class='render-error'" : "";
      result.innerHTML = `<pre${className}>${escapeHtml(String(text))}</pre>`;
    };

    const renderPreHtml = (html) => {
      result.innerHTML = `<pre>${html}</pre>`;
    };

    const renderRangeLinks = (text) =>
      escapeHtml(text)
        .split("\n")
        .map((line) =>
          line.replace(
            /([A-Za-z0-9_-]*)\@(\d+)\.\.(\d+)/,
            (text, name, start, end) =>
              `<b>${name}</b><a data-range="${start}-${end}">@${start}..${end}</a>`
          )
        )
        .join("\n");

    const renderFeatureOverview = () => {
      const rows = [
        [
          "WASM worker DTO",
          "`outlineJson`, `metadataJson`, `orgElementsJson`, `orgElementsIndexJson`, `orgElementsIndexQueryJson`, `lintJson`, `sectionIndexJson`, `sparseTreeJson`, `sparseTreeExplainJson`, `agendaViewJson`, `agendaBlockJson`, `capturePlanJson`, `attachmentsJson`, `sourceBlocksJson`, `columnViewsJson`, `dynamicBlocksJson`, `propertyProfileJson`, `propertyProfileWithSchemasJson`, `refileTargetsJson`, `refilePlanJson`, `includeExpansionJson`, `datetreeJson`, `progressStatsJson`, `clockRollupsJson`, `clockTablePlansJson`, `clockIssuesJson`, `taskBlockersJson`, `sddJson`, `memoryJson`, `cryptJson`, `runtimeMetadataJson`, and `snapshotJson` expose typed browser projections; the worker keeps Rust parsing off the UI thread.",
        ],
        [
          "Public parser API",
          "`Org::document()` returns the owned semantic AST; `Org::syntax_document()` keeps the lossless rowan tree available.",
        ],
        [
          "Semantic metadata",
          "Source ranges, line/column annotations, diagnostics, traversal, `map_ann`, and `try_map_ann` are exposed through parser v2.",
        ],
        [
          "M15 side tables",
          "`metadata`, `filetags`, `export_settings`, `link_abbreviations`, and `footnotes` are visible in the Semantic AST tab without changing the lossless tree.",
        ],
        [
          "Headlines and tasks",
          "Custom TODO/DONE declarations, priorities, tags, planning timestamps, property drawers, effective tags, stable anchors, and inlinetasks project into semantic nodes.",
        ],
        [
          "Agenda projection",
          "`Document::agenda_entries()` derives scheduled, scheduled-delay, deadline, warning, overdue, closed, plain active timestamp, headline time, repeated, category-aware, range-aware, and tag-filtered agenda rows from semantic timestamps.",
        ],
        [
          "Agent planning",
          "`Document::agent_planning_snapshot()` renders compact agent cards from agenda rows. `PLANxxx` values are output diagnostics, not Org source syntax.",
        ],
        [
          "Agent memory",
          "`Document::agent_memory_snapshot()` renders compact memory cards from ordinary Org headings, TODO states, properties, timestamps, drawers, clocks, archive tags, attachments, and links. `MEMxxx` values are output diagnostics, not Org source syntax.",
        ],
        [
          "SDD",
          "`Document::sdd_status()` projects Org-native architecture nodes, parent edges, lifecycle status, concerns, rationale, and stable IDs for browser/agent inspection.",
        ],
        [
          "Org elements bridge",
          "`#+TAGS:` vocabulary, source blocks, sections, and `#+PYTHON:` directives project into `orgElementsJson`; `orgElementsIndexJson` and `orgElementsIndexQueryJson` expose compact flat maps for kind-based filtering, and native hosts can execute any chosen tool explicitly with the same org-elements payload.",
        ],
        [
          "Attachments",
          "`DIR`, deprecated `ATTACH_DIR`, ID-derived attachment directories, `ATTACH` tags, and `attachment:` link search suffixes project into semantic metadata without filesystem access.",
        ],
        [
          "Blocks and tables",
          "Source/example/fixed-width line values, normalized values, line endings, code refs, typed switches, header args, table formulas, and column alignment rows are modeled.",
        ],
        [
          "Links and targets",
          "Internal links resolve against headlines, `CUSTOM_ID`, org-id `ID`, explicit targets, radio targets, footnotes, and source/example coderefs; default descriptions and search suffixes are projected.",
        ],
        [
          "Objects",
          "Links, timestamps, balanced-bracket citations, macros, targets, radio targets, entities, snippets, inline src/call, markup, code, and verbatim are covered.",
        ],
        [
          "Preprocessing",
          "`#+INCLUDE:` and `#+MACRO:` are collected as explicit side tables; include expansion planning and macro expansion stay opt-in and visible in the Semantic AST/WASM DTO tabs.",
        ],
        [
          "Export boundary",
          "`project_for_export` adds opt-in pruning and text transforms; HTML, Markdown, and LaTeX defaults continue to use the lossless syntax substrate.",
        ],
      ];

      return `
        <div class="markdown-body feature-overview">
          <h2>Parser v2 Feature Surface</h2>
          <table>
            <tbody>
              ${rows
                .map(
                  ([name, detail]) =>
                    `<tr><td><strong>${escapeHtml(name)}</strong></td><td>${inlineCode(detail)}</td></tr>`
                )
                .join("")}
            </tbody>
          </table>
        </div>
      `;
    };

    const inlineCode = (text) =>
      escapeHtml(text).replace(/`([^`]+)`/g, "<code>$1</code>");

    // init

    init().then(() => {
      org = new Org("");

      editor.session.setValue(`# git hash: ${Org.gitHash}
# build time: ${Org.buildTime}

*Orgize*, a /pure/ =Rust= library for
parsing +Emacs+ _org-mode_ files.
